services:
  backend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: index.mjs
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BIND=0.0.0.0
    ports:
      - '127.0.0.1:3001:3000'
    stop_grace_period: 60s

  rev-proxy:
    image: nginx:1.27-alpine
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
